<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GhostPass</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #222235;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #e8e8f0;
      --muted: #6b6b8a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HOME SCREEN ── */
    #home {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    #home::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      z-index: 0;
    }

    #home::after {
      content: '';
      position: fixed;
      top: 30%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(124,58,237,0.15) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .home-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent2);
      border: 1px solid var(--accent2);
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 1.5rem;
      letter-spacing: 0.1em;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      animation: fadeUp 0.5s ease 0.2s both;
    }

    h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      font-weight: 400;
      animation: fadeUp 0.5s ease 0.3s both;
    }

    .search-box {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.5s ease 0.4s both;
    }

    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    #urlInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 1rem 1.25rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--text);
      min-width: 0;
    }

    #urlInput::placeholder { color: var(--muted); }

    .go-btn {
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      border: none;
      padding: 1rem 1.5rem;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .go-btn:hover { opacity: 0.9; }
    .go-btn:active { transform: scale(0.97); }

    .tips {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.5s ease 0.5s both;
    }

    .tip {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 100px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .tip:hover { border-color: var(--accent); color: var(--text); }

    /* ── BROWSER SCREEN ── */
    #browser {
      display: none;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
    }

    #browser.active { display: flex; }

    #siteFrame {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
      display: block;
      allow: fullscreen;
    }

    /* ── FLOATING URL BAR ── */
    #floatBar {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(18, 18, 26, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 100px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem 0.5rem 1.25rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      min-width: 280px;
      max-width: 500px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #floatBar.visible { opacity: 1; }

    #floatUrl {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar-btn {
      background: rgba(255,255,255,0.07);
      border: none;
      color: var(--text);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
      font-size: 0.8rem;
    }

    .bar-btn:hover { background: rgba(255,255,255,0.15); }

    .bar-btn.home-icon { font-size: 0.9rem; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- HOME -->
  <div id="home">
    <div class="home-inner">
      <div class="badge">FREE · PRIVATE · UNBLOCKED</div>
      <h1>Ghost<span>Pass</span></h1>
      <p class="subtitle">Slip through the web, unseen.</p>

      <div class="search-box">
        <input type="text" id="urlInput" placeholder="Enter a URL..." autocomplete="off" spellcheck="false"/>
        <button class="go-btn" onclick="go()">GO →</button>
      </div>

      <div class="tips">
        <div class="tip" onclick="loadSite('https://dashmetry.com')">👾 Dashmetry</div>
        <div class="tip" onclick="loadSite('https://youtube.com')">▶ YouTube</div>
        <div class="tip" onclick="loadSite('https://wikipedia.org')">📖 Wikipedia</div>
        <div class="tip" onclick="loadSite('https://news.ycombinator.com')">💻 HackerNews</div>
      </div>
    </div>
  </div>

  <!-- BROWSER -->
  <div id="browser">
    <iframe
      id="siteFrame"
      allowfullscreen
      allow="fullscreen; autoplay; encrypted-media; picture-in-picture"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-modals"
    ></iframe>
  </div>

  <!-- FLOATING BAR -->
  <div id="floatBar">
    <span id="floatUrl">loading...</span>
    <button class="bar-btn" title="Fullscreen" onclick="goFullscreen()">⛶</button>
    <button class="bar-btn home-icon" title="Home" onclick="goHome()">⌂</button>
  </div>

  <script>
    const homeEl    = document.getElementById('home');
    const browserEl = document.getElementById('browser');
    const frame     = document.getElementById('siteFrame');
    const floatBar  = document.getElementById('floatBar');
    const floatUrl  = document.getElementById('floatUrl');
    const input     = document.getElementById('urlInput');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });

    function go() {
      let url = input.value.trim();
      if (!url) return;
      loadSite(url);
    }

    function loadSite(url) {
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }

      const proxyUrl = '/api/proxy?url=' + encodeURIComponent(url);

      frame.src = proxyUrl;
      floatUrl.textContent = url;

      homeEl.style.display = 'none';
      browserEl.classList.add('active');

      setTimeout(() => {
        floatBar.classList.add('visible');
      }, 600);
    }

    function goHome() {
      browserEl.classList.remove('active');
      floatBar.classList.remove('visible');
      frame.src = '';
      homeEl.style.display = 'flex';
      input.value = '';
    }

    function goFullscreen() {
      const el = document.getElementById('browser');
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }
  </script>
</body>
</html>
